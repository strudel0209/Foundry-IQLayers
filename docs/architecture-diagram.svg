<svg xmlns="http://www.w3.org/2000/svg" width="820" height="640" viewBox="0 0 820 640">
  <defs>
    <style>
      /* Flowing arrow animations — accelerates as queries propagate deeper */
      @keyframes flow {
        to { stroke-dashoffset: -15; }
      }
      .flow {
        stroke-dasharray: 10 5;
        fill: none;
        stroke-width: 2.5;
        stroke-linecap: round;
        animation: flow 0.8s linear infinite;
      }
      .flow-entry  { animation-duration: 1.2s; }
      .flow-fanout { animation-duration: 0.8s; }
      .flow-deep   { animation-duration: 0.5s; }

      text {
        font-family: "Segoe UI", system-ui, -apple-system, Roboto, "Helvetica Neue", Arial, sans-serif;
      }
    </style>

    <!-- Gradient for the orchestrator -->
    <linearGradient id="orch-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#004E8C"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>

    <!-- Arrowhead markers (one per color) -->
    <marker id="ah-gray"   viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="7" orient="auto"><path d="M0,0.5 L9,3.5 L0,6.5" fill="#605E5C"/></marker>
    <marker id="ah-blue"   viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="7" orient="auto"><path d="M0,0.5 L9,3.5 L0,6.5" fill="#0078D4"/></marker>
    <marker id="ah-green"  viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="7" orient="auto"><path d="M0,0.5 L9,3.5 L0,6.5" fill="#107C10"/></marker>
    <marker id="ah-purple" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="7" orient="auto"><path d="M0,0.5 L9,3.5 L0,6.5" fill="#5C2D91"/></marker>
  </defs>

  <!-- ============================================================ -->
  <!-- Background card                                              -->
  <!-- ============================================================ -->
  <rect width="820" height="640" rx="16" fill="#FFFFFF" stroke="#E1DFDD" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- ROW 1 — User Query                                           -->
  <!-- ============================================================ -->
  <rect x="310" y="28" width="200" height="44" rx="22" fill="#323130" filter="url(#shadow)"/>
  <text x="410" y="54" text-anchor="middle" dominant-baseline="central" fill="#FFFFFF" font-size="14" font-weight="600">User Query</text>

  <!-- Arrow: User → Orchestrator (slow, stately) -->
  <line x1="410" y1="72" x2="410" y2="112" class="flow flow-entry" stroke="#605E5C" marker-end="url(#ah-gray)"/>

  <!-- ============================================================ -->
  <!-- ROW 2 — Orchestrator Agent                                   -->
  <!-- ============================================================ -->
  <rect x="150" y="112" width="520" height="100" rx="14" fill="url(#orch-grad)" filter="url(#shadow)"/>
  <text x="410" y="142" text-anchor="middle" dominant-baseline="central" fill="#FFFFFF" font-size="17" font-weight="700">Orchestrator Agent</text>
  <text x="410" y="166" text-anchor="middle" dominant-baseline="central" fill="rgba(255,255,255,0.8)" font-size="12" font-weight="400">Azure AI Foundry Agent Service</text>
  <text x="410" y="190" text-anchor="middle" dominant-baseline="central" fill="rgba(255,255,255,0.55)" font-size="11">Decomposes · Delegates · Synthesizes</text>

  <!-- ============================================================ -->
  <!-- Fan-out arrows: Orchestrator → Specialists                   -->
  <!-- ============================================================ -->
  <!-- Left curve (blue) -->
  <path d="M300,212 C300,254 150,254 150,296" class="flow flow-fanout" stroke="#0078D4" marker-end="url(#ah-blue)"/>
  <!-- Center straight (green) -->
  <line x1="410" y1="212" x2="410" y2="296" class="flow flow-fanout" stroke="#107C10" marker-end="url(#ah-green)"/>
  <!-- Right curve (purple) -->
  <path d="M520,212 C520,254 670,254 670,296" class="flow flow-fanout" stroke="#5C2D91" marker-end="url(#ah-purple)"/>

  <!-- Step number badges -->
  <circle cx="224" cy="254" r="13" fill="#FFFFFF" stroke="#0078D4" stroke-width="1.5"/>
  <text x="224" y="254" text-anchor="middle" dominant-baseline="central" fill="#0078D4" font-size="10" font-weight="700">1</text>

  <circle cx="410" cy="254" r="13" fill="#FFFFFF" stroke="#107C10" stroke-width="1.5"/>
  <text x="410" y="254" text-anchor="middle" dominant-baseline="central" fill="#107C10" font-size="10" font-weight="700">2</text>

  <circle cx="596" cy="254" r="13" fill="#FFFFFF" stroke="#5C2D91" stroke-width="1.5"/>
  <text x="596" y="254" text-anchor="middle" dominant-baseline="central" fill="#5C2D91" font-size="10" font-weight="700">3</text>

  <!-- ============================================================ -->
  <!-- ROW 3 — Specialist Agents                                    -->
  <!-- ============================================================ -->
  <!-- Data Analyst (Fabric IQ) -->
  <rect x="40" y="296" width="220" height="80" rx="12" fill="#0078D4" filter="url(#shadow)"/>
  <text x="150" y="326" text-anchor="middle" dominant-baseline="central" fill="#FFFFFF" font-size="14" font-weight="600">Data Analyst</text>
  <text x="150" y="350" text-anchor="middle" dominant-baseline="central" fill="rgba(255,255,255,0.7)" font-size="11" font-weight="600" letter-spacing="1.2">FABRIC IQ</text>

  <!-- Knowledge Agent (Foundry IQ) -->
  <rect x="300" y="296" width="220" height="80" rx="12" fill="#107C10" filter="url(#shadow)"/>
  <text x="410" y="326" text-anchor="middle" dominant-baseline="central" fill="#FFFFFF" font-size="14" font-weight="600">Knowledge Agent</text>
  <text x="410" y="350" text-anchor="middle" dominant-baseline="central" fill="rgba(255,255,255,0.7)" font-size="11" font-weight="600" letter-spacing="1.2">FOUNDRY IQ</text>

  <!-- People Agent (Work IQ) -->
  <rect x="560" y="296" width="220" height="80" rx="12" fill="#5C2D91" filter="url(#shadow)"/>
  <text x="670" y="326" text-anchor="middle" dominant-baseline="central" fill="#FFFFFF" font-size="14" font-weight="600">People Agent</text>
  <text x="670" y="350" text-anchor="middle" dominant-baseline="central" fill="rgba(255,255,255,0.7)" font-size="11" font-weight="600" letter-spacing="1.2">WORK IQ</text>

  <!-- ============================================================ -->
  <!-- Connection arrows: Specialists → Data Sources (fast)         -->
  <!-- ============================================================ -->
  <line x1="150" y1="376" x2="150" y2="444" class="flow flow-deep" stroke="#0078D4" marker-end="url(#ah-blue)"/>
  <line x1="410" y1="376" x2="410" y2="444" class="flow flow-deep" stroke="#107C10" marker-end="url(#ah-green)"/>
  <line x1="670" y1="376" x2="670" y2="444" class="flow flow-deep" stroke="#5C2D91" marker-end="url(#ah-purple)"/>

  <!-- Protocol labels (right of each arrow) -->
  <text x="168" y="414" fill="#0078D4" font-size="9" font-weight="600">NL2SQL</text>
  <text x="428" y="414" fill="#107C10" font-size="9" font-weight="600">KB Retrieve</text>
  <text x="688" y="414" fill="#5C2D91" font-size="9" font-weight="600">Mail · ODSP</text>

  <!-- ============================================================ -->
  <!-- ROW 4 — Data Sources                                         -->
  <!-- ============================================================ -->

  <!-- Fabric Data Agent -->
  <rect x="40" y="444" width="220" height="156" rx="12" fill="#F0F8FF" stroke="#0078D4" stroke-width="1.5"/>
  <text x="150" y="472" text-anchor="middle" dominant-baseline="central" fill="#005A9E" font-size="13" font-weight="700">Fabric Data Agent</text>
  <text x="150" y="492" text-anchor="middle" dominant-baseline="central" fill="#605E5C" font-size="10">OBO Auth · SQL Endpoint</text>
  <line x1="56" y1="506" x2="244" y2="506" stroke="#D2E4F4" stroke-width="1"/>
  <!-- Table pills -->
  <rect x="52"  y="516" width="96" height="22" rx="11" fill="#E1EFF9"/>
  <text x="100" y="527" text-anchor="middle" dominant-baseline="central" fill="#005A9E" font-size="10">dimstore</text>
  <rect x="156" y="516" width="96" height="22" rx="11" fill="#E1EFF9"/>
  <text x="204" y="527" text-anchor="middle" dominant-baseline="central" fill="#005A9E" font-size="10">dimproducts</text>
  <rect x="52"  y="546" width="96" height="22" rx="11" fill="#E1EFF9"/>
  <text x="100" y="557" text-anchor="middle" dominant-baseline="central" fill="#005A9E" font-size="10">factsales</text>
  <rect x="156" y="546" width="96" height="22" rx="11" fill="#E1EFF9"/>
  <text x="204" y="557" text-anchor="middle" dominant-baseline="central" fill="#005A9E" font-size="10">factreturns</text>

  <!-- AI Search KB -->
  <rect x="300" y="444" width="220" height="156" rx="12" fill="#F0FAF0" stroke="#107C10" stroke-width="1.5"/>
  <text x="410" y="472" text-anchor="middle" dominant-baseline="central" fill="#0B6A0B" font-size="13" font-weight="700">AI Search KB</text>
  <text x="410" y="492" text-anchor="middle" dominant-baseline="central" fill="#605E5C" font-size="10">MCP · Key Auth</text>
  <line x1="316" y1="506" x2="504" y2="506" stroke="#C8E6C8" stroke-width="1"/>
  <!-- Document pills -->
  <rect x="312" y="516" width="96" height="22" rx="11" fill="#DFF0DF"/>
  <text x="360" y="527" text-anchor="middle" dominant-baseline="central" fill="#0B6A0B" font-size="10">SOPs</text>
  <rect x="416" y="516" width="96" height="22" rx="11" fill="#DFF0DF"/>
  <text x="464" y="527" text-anchor="middle" dominant-baseline="central" fill="#0B6A0B" font-size="10">Policies</text>
  <rect x="312" y="546" width="96" height="22" rx="11" fill="#DFF0DF"/>
  <text x="360" y="557" text-anchor="middle" dominant-baseline="central" fill="#0B6A0B" font-size="10">Postmortems</text>
  <rect x="416" y="546" width="96" height="22" rx="11" fill="#DFF0DF"/>
  <text x="464" y="557" text-anchor="middle" dominant-baseline="central" fill="#0B6A0B" font-size="10">Procedures</text>

  <!-- Work IQ MCP -->
  <rect x="560" y="444" width="220" height="156" rx="12" fill="#F8F0FF" stroke="#5C2D91" stroke-width="1.5"/>
  <text x="670" y="472" text-anchor="middle" dominant-baseline="central" fill="#4B2080" font-size="13" font-weight="700">Work IQ MCP</text>
  <text x="670" y="492" text-anchor="middle" dominant-baseline="central" fill="#605E5C" font-size="10">OAuth · Agent 365</text>
  <line x1="576" y1="506" x2="764" y2="506" stroke="#DFD0EF" stroke-width="1"/>
  <!-- Service pills -->
  <rect x="572" y="516" width="96" height="22" rx="11" fill="#EDE0F8"/>
  <text x="620" y="527" text-anchor="middle" dominant-baseline="central" fill="#4B2080" font-size="10">Email</text>
  <rect x="676" y="516" width="96" height="22" rx="11" fill="#EDE0F8"/>
  <text x="724" y="527" text-anchor="middle" dominant-baseline="central" fill="#4B2080" font-size="10">SharePoint</text>
  <rect x="572" y="546" width="96" height="22" rx="11" fill="#EDE0F8"/>
  <text x="620" y="557" text-anchor="middle" dominant-baseline="central" fill="#4B2080" font-size="10">Calendar</text>
  <rect x="676" y="546" width="96" height="22" rx="11" fill="#EDE0F8"/>
  <text x="724" y="557" text-anchor="middle" dominant-baseline="central" fill="#4B2080" font-size="10">Meetings</text>

  <!-- ============================================================ -->
  <!-- Footer — MCP protocol label                                  -->
  <!-- ============================================================ -->
  <line x1="150" y1="616" x2="670" y2="616" stroke="#E1DFDD" stroke-width="1"/>
  <text x="410" y="630" text-anchor="middle" dominant-baseline="central" fill="#A19F9D" font-size="10" letter-spacing="2">MCP · MODEL CONTEXT PROTOCOL</text>
</svg>
